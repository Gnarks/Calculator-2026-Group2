# automatic deployment of the server 
name: Deployement on joselin

on:
  push:
    branches: [ master]
    # TODO: delete only to test github variables are well setup
  pull_request:
    branches: [  dev ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/Calculator-2026-Group2/
            
            # git pull origin master
            
            # todo remove this and uncomment above only to test github variables
            git checkout Maxime/FEAT/ContinuousDeployment
            
            docker compose up -d --build
            
            docker image prune -f
