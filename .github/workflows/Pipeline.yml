# full ci/cd pipeline
name: CI/CD pipeline

on:
  pull_request:
    branches: [ master, dev ]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pages: write
  id-token: write

jobs:
  # the first job to be ran, maven verify to test
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    name: Building and Testing (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'maven'
        
      # Runs the tests, pmd and JaCoCo
      - name: Build with Maven
        run: mvn -B verify --file backend/pom.xml

      # upload the target folder only from linux to avoid republishing it 
      - name: Upload Build Assets
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-assets
          path: backend/target/

  # the second job requires the first one to suceed
  # then runs JaCoCo to generate a badge for github
  jacoco:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download Build Assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-assets
          path: backend/target/
      - name: Generate JaCoCo Badge
        uses: cicirello/jacoco-badge-generator@72266185b7ee48a6fd74eaf0238395cc8b14fef8 # v2.12.1
        with:
          generate-coverage-badge: true
          generate-branches-badge: true
          generate-summary: true
          jacoco-csv-file: backend/target/site/jacoco/jacoco.csv

  # the last job requires the all others to suceed (by chained dependencies)
  # creates a report from the javadoc, tests, test coverage and code analysis 
  report:
    needs: [jacoco]
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Download Build Assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-assets
          path: backend/target/

      - name: Generate Maven Site
        run: mvn site -DskipTests --file backend/pom.xml

      # uploads the report to github pages
      - name: Upload to Pages
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: 'backend/target/site'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        
