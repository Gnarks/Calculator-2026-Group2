# full ci/cd pipeline
name: CI/CD pipeline

on:
  pull_request:
    branches: [ master, dev ]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pages: write
  id-token: write

jobs:
  # the first job to be ran, maven verify to test
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    name: Building and Testing (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'maven'
        
      # Runs the tests, pmd and JaCoCo
      - name: Build with Maven
        run: mvn -B verify

        # upload the target folder only from linux to avoid republishing it 
      - name: Upload Build Assets
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: target/

  # the second job requires the first one to suceed
  # then runs JaCoCo to generate a badge for github
  jacoco:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download Build Assets
        uses: actions/download-artifact@v7
        with:
          name: build-assets
          path: target/

      - name: Generate JaCoCo Badge
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-coverage-badge: true
          generate-branches-badge: true
          generate-summary: true

  # the last job requires the all others to suceed (by chained dependencies)
  # creates a report from the javadoc, tests, test coverage and code analysis 
  report:
    needs: [jacoco]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Download Build Assets
        uses: actions/download-artifact@v7
        with:
          name: build-assets
          path: target/

      - name: Generate Maven Site
        run: mvn site -DskipTests

        # uploads the report to github pages
      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'target/site'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
