name: CodeQL security analysis for Java

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]
  schedule:
    - cron: '42 1 * * 2'

permissions:
  contents: read

jobs:
  build:
    name: compiling and security scanning
    runs-on: ubuntu-latest  
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
      
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
      with:
        egress-policy: audit

    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up with Java 25
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: 'temurin'
        java-version: 25
        cache: 'maven'

    - name: Initialize CodeQL for security scanning
      uses: github/codeql-action/init@b895512248b1b5b0089ac3c33ecf123c2cd6f373 # v4.32.1
      with:
        languages: 'java-kotlin'
        
    - name: Compile Java source code with Maven
      run: mvn -B compile --file backend/pom.xml
      # unit tests are not run as part of this workflow, since they are not required for the CodeQL security analysis

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@b895512248b1b5b0089ac3c33ecf123c2cd6f373 # v4.32.1
      with:
        category: "/language:java-kotlin"
        


