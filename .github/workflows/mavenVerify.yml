# used to verify the tests of the project using maven
# generates the test report in the target directory
name: Maven Verify

# Triggers on PR of master of dev
# Or when a release is made
on:

  #todo: remove this push (only for test purposes)
  # ===========
  # push: 
    # branches: [ Maxime/feat/AutomaticReport ]
  # ===========

  pull_request:
    branches: [ master, dev]
  release:
      types: [published]
  workflow_dispatch:  # For manual triggering of the workflow if we want to run it on our branch

permissions:
  contents: read

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]


    name: building, testing for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    permissions:
      # need write permissions for publishing the test report
      checks: write
      contents: write

    steps:
    - id: checkout
      name: checkout repository
      uses: actions/checkout@v6
      
    - id: setupjava
      name: Set up with Java 25
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25
        cache: 'maven'
        
    - id: mvn
      name: Build with Maven (including running all tests)
      run: mvn -B verify

    # uploads the assets in the target folder
    # used by future workflows to avoid rebuilding each time
    - name: Upload Target Folder
        # only upload from unbuntu otherwise would need to overwrite
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v6
      with:
        name: build-assets
        path: target/
