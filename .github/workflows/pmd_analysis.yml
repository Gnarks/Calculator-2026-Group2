# separate PMD yaml file for the badge
name: PMD code analysis

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:
  # runs pmd and outputs a sarif file and is used for the github badge 
  pmd-code-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Run PMD
        id: pmd
        uses: pmd/pmd-github-action@d9c1f3c5940cbf5923f1354e83fa858b4496ebaa # v2.0.0
        with:
          rulesets: 'category/java/errorprone.xml'
          analyzeModifiedFilesOnly: 'false'
          sourcePath: 'backend/src/main/java'
      - name: Fail build if there are violations
        if: steps.pmd.outputs.violations >= 50
        run: exit 1


      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        with:
          sarif_file: pmd-report.sarif

