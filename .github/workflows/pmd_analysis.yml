# separate PMD yaml file for the badge
name: PMD code analysis

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # runs pmd and outputs a sarif file and is used for the github badge 
  pmd-code-scan:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Run PMD
        id: pmd
        uses: pmd/pmd-github-action@v2
        with:
          rulesets: 'category/java/errorprone.xml'
          analyzeModifiedFilesOnly: 'false'
          sourcePath: 'backend/src/main/java'
      - name: Fail build if there are violations
        if: steps.pmd.outputs.violations >= 50
        run: exit 1


      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4.32.5
        with:
          sarif_file: pmd-report.sarif

